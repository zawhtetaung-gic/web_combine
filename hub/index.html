<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Project Hub</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
      }

      header {
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background: #1e293b;
        font-size: 22px;
        font-weight: bold;
        color: #38bdf8;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 15px;
        padding: 20px;
      }

      .card {
        background: #1e293b;
        border-radius: 10px;
        padding: 15px;
        text-decoration: none;
        color: white;
        border-left: 4px solid #38bdf8;
        transition: 0.2s;
      }

      .card:hover {
        transform: translateY(-3px);
        background: #334155;
      }

      .name {
        font-size: 16px;
        margin-bottom: 8px;
        color: #38bdf8;
      }

      .port {
        font-size: 13px;
        color: #94a3b8;
      }

      .btn {
        margin-top: 10px;
        display: inline-block;
        padding: 6px 10px;
        background: #38bdf8;
        color: black;
        border-radius: 6px;
        font-size: 12px;
      }
    </style>
  </head>

  <body>
    <header>
      <img src="/images/GIC_logo.ico" alt="logo" width="36" height="36" />
      Project Hub
    </header>

    <div class="grid" id="grid"></div>

    <script>
      async function load() {
        const res = await fetch("/api/projects");
        const data = await res.json();

        document.getElementById("grid").innerHTML = data
          .map(
            (project) => `
      <div class="card">

        <div class="name">${project.name}</div>

        ${project.services
          .map(
            (s) => `
          <div style="margin-top:10px;">
            <div class="port">
              ${s.type.toUpperCase()} - Port ${s.port}
            </div>

            <a class="btn"
               href="http://localhost:${s.port}"
               target="_blank">
              Open
            </a>
          </div>
        `,
          )
          .join("")}

      </div>
    `,
          )
          .join("");
      }

      load();
    </script>
  </body>
</html>
